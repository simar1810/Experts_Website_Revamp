name: Deploy to App Production

on:
  push:
    branches:
      - main

jobs:
  deploy_to_production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install SSH Pass
        run: sudo apt-get install sshpass -y

      - name: SSH and Deploy
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          sshpass -p $SSH_PASSWORD ssh -o StrictHostKeyChecking=no $SSH_USER@$SERVER_IP "
          export PATH=/home/deployment/.nvm/versions/node/v20.15.1/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin && \
          cd /var/www/zeefit.in/ && \
          git stash && \
          git pull origin main && \
          /home/deployment/.nvm/versions/node/v20.17.0/bin/npm i --legacy-peer-deps && \
          /home/deployment/.nvm/versions/node/v20.17.0/bin/npm run build && \
          sudo systemctl restart zeefit.service && \
          echo 'Deployment successful'" || echo 'Deployment failed'
